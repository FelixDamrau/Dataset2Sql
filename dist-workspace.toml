[workspace]
members = ["dist:."]

[package]
name = "Dataset2Sql"
description = "Insert XML serialized datasets into MSSQL DBs"
version = "0.2.0"    # keep in sync with your release version
repository = "https://github.com/FelixDamrau/Dataset2Sql"
license = "GPLv3"
binaries = ["Dataset2Sql"]
build-command = ["bash", "./scripts/dist-build.sh"]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.30.3"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = true
# Plan jobs to run in CI
plan-jobs = ["./dist-dotnet-validate"]
